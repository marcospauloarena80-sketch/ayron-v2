name: AYRON CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  api:
    name: API — Typecheck + Lint + Tests + Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ayron
          POSTGRES_PASSWORD: ayron
          POSTGRES_DB: ayron_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ayron:ayron@localhost:5432/ayron_test
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1d
      NODE_ENV: test
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: ci
      MINIO_SECRET_KEY: ci_secret
      MINIO_BUCKET: ayron-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - run: cd apps/api && npm ci
      - run: cd apps/api && npx prisma generate
      - run: cd apps/api && npx prisma migrate deploy
        continue-on-error: true
      - run: cd apps/api && npx tsc --noEmit
      - run: cd apps/api && npm run lint --if-present
      - run: cd apps/api && npm run test --if-present -- --passWithNoTests
      - run: cd apps/api && npm run build

  web:
    name: Web — Typecheck + Lint + Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npx tsc --noEmit
      - run: cd apps/web && npm run lint --if-present
      - run: cd apps/web && npm run build
